<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>七下外研版英语跑酷</title>
    <style>
        :root {
            --primary-purple: #C6A4E8;
            --light-purple: #D8BFD8;
            --pale-purple: #E6E6FA;
            --lavender-blush: #FFF0F5;
            --white: #FFFFFF;
            --off-white: #F8F8FF;
            --dark-purple-text: #7B2D8E;
            --dark-overlay-bg: rgba(100, 70, 130, 0.92);
            --option-box-bg: rgba(255, 255, 255, 0.25);
            --lane-border-color: rgba(255, 255, 255, 0.15);
            --text-shadow-color: rgba(0, 0, 0, 0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, var(--light-purple) 0%, var(--primary-purple) 100%);
            color: var(--white); overflow: hidden; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .game-container { width: 100vw; height: 100vh; display: flex; position: relative; }

        /* 首页单元选择 */
        .unit-menu {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 500px;
            margin-top: 20px;
        }
        .unit-btn {
            background: var(--white); color: var(--dark-purple-text);
            padding: 20px; border-radius: 12px; font-size: 20px; font-weight: bold;
            cursor: pointer; border: none; transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .unit-btn:hover { transform: scale(1.05); background: var(--lavender-blush); }

        /* 顶部信息 */
        .header-info {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 200; text-align: center; text-shadow: 1px 1px 3px var(--text-shadow-color);
        }
        .game-title { font-size: 28px; font-weight: bold; color: var(--lavender-blush); margin-bottom: 5px; }
        .score { font-size: 18px; color: var(--off-white); }

        .question-area {
            position: absolute; top: 90px; left: 50%; transform: translateX(-50%);
            z-index: 190; text-align: center; font-size: 28px; font-weight: bold;
            color: var(--white); text-shadow: 1px 1px 3px var(--text-shadow-color);
            padding: 10px 25px; background: rgba(138, 43, 226, 0.4);
            border-radius: 10px; border: 2px solid rgba(255,255,255,0.3);
        }

        .lives-container { position: absolute; top: 15px; right: 70px; z-index: 201; display: flex; gap: 8px; }
        .heart { font-size: 28px; transition: all 0.3s; }
        .heart.lost { opacity: 0.2; transform: scale(0.7); }

        .sound-toggle {
            position: absolute; top: 15px; right: 15px; z-index: 202;
            width: 45px; height: 45px; background: rgba(255,255,255,0.2);
            border: 2px solid var(--white); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 24px;
        }

        #result-message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 60px; font-weight: bold; z-index: 150; opacity: 0; transition: opacity 0.3s;
        }
        #result-message.show { opacity: 1; }
        #result-message.correct { color: #2ecc71; }
        #result-message.wrong { color: #e74c3c; }

        /* 游戏区域 */
        .game-area { flex: 1; display: flex; position: relative; overflow: hidden; border-right: 3px solid var(--white); }
        .lane { width: 33.333%; height: 100%; border-left: 1px dashed var(--lane-border-color); position: relative; cursor: pointer; }
        .lane:first-child { border-left: none; }
        .option-box {
            position: absolute; top: -200px; left: 5%; width: 90%; height: 150px;
            background: var(--option-box-bg); border: 2px solid var(--white);
            border-radius: 12px; display: flex; justify-content: center; align-items: center;
            text-align: center; font-weight: bold; padding: 10px 12px; pointer-events: none;
        }
        .option-box .chinese-translation { font-size: 18px; color: var(--dark-purple-text); }

        .runner {
            position: absolute; bottom: 10%; width: 50px; height: 70px;
            z-index: 100; transition: left 0.25s ease-out; pointer-events: none;
        }
        .runner-head { width: 25px; height: 25px; background: var(--white); border-radius: 50%; margin: 0 auto; }
        .runner-body { width: 5px; height: 30px; background: var(--white); margin: 0 auto; }
        .runner-legs { display: flex; justify-content: center; gap: 10px; margin-top: -2px; }
        .leg { width: 5px; height: 18px; background: var(--white); animation: run 0.35s infinite alternate; }
        .leg:nth-child(2) { animation-delay: 0.175s; }
        @keyframes run { from { transform: rotate(-40deg); } to { transform: rotate(40deg); } }

        /* 右侧栏 */
        .timeline {
            width: 250px; background: var(--primary-purple); opacity: 0.9;
            padding: 15px; overflow-y: auto; scroll-behavior: smooth; border-left: 3px solid var(--white);
        }
        .timeline-item {
            margin: 12px 0; padding: 12px 10px; background: var(--lavender-blush);
            border-radius: 10px; border: 2px solid var(--light-purple);
            transition: all 0.3s; min-height: 60px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .timeline-item.active { animation: blink 1.2s infinite; transform: scale(1.1); background: var(--white); }
        .timeline-item.completed { opacity: 0.5; background: var(--pale-purple); }
        @keyframes blink { 0%,100% { box-shadow: 0 0 15px rgba(255,255,255,0.7); } 50% { box-shadow: 0 0 40px rgba(255,255,255,1); } }
        .year { font-size: 16px; font-weight: bold; color: var(--primary-purple); word-break: break-all; }

        /* 通用遮罩层 */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-overlay-bg); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            transition: opacity 0.5s; padding: 20px; overflow-y: auto;
        }
        .overlay.hidden { opacity: 0; pointer-events: none; }
        .overlay h1 { font-size: 42px; margin-bottom: 20px; color: var(--lavender-blush); text-align: center; }
        .overlay p { font-size: 18px; margin-bottom: 20px; text-align: center; line-height: 1.6; max-width: 650px; padding: 0 20px; }

        button.main-btn {
            padding: 13px 35px; font-size: 24px; background: var(--white);
            color: var(--dark-purple-text); border: none; border-radius: 10px;
            cursor: pointer; font-weight: bold; transition: all 0.3s; margin: 10px;
        }
        button.main-btn:hover { transform: scale(1.05); }

        .difficulty-selection { margin-bottom: 25px; }
        .difficulty-btn { padding: 8px 20px; font-size: 18px; background: var(--lavender-blush); margin: 0 5px; color: var(--dark-purple-text); border-radius: 8px; border:none; cursor:pointer;}
        .difficulty-btn.active { background: var(--primary-purple); color: var(--white); }

        /* 错题本 */
        .wrong-words-section { width: 100%; max-width: 600px; margin: 20px 0; }
        .wrong-words-list { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-height: 30vh; overflow-y: auto; padding: 10px; }
        .wrong-word-card { background: rgba(255,255,255,0.15); border-radius: 10px; padding: 10px; min-width: 140px; border: 1px solid rgba(255,255,255,0.3); }
        .wrong-word-card .eng { font-weight: bold; color: #ffcc00; margin-bottom: 5px; }
        .wrong-word-card .chn { font-size: 14px; color: #eee; }
        .encourage-text { font-style: italic; color: #ffcc00; margin-top: 10px; font-size: 18px; text-align: center; }

        @media screen and (max-width: 768px) {
            .timeline { width: 130px; } .question-area { font-size: 22px; top: 75px; }
            .game-title { font-size: 20px; } .lives-container { right: 60px; }
            .option-box { height: 110px; } .year { font-size: 14px; }
            .unit-menu { grid-template-columns: 1fr; }
        }
    </style>
</head>

                <button class="difficulty-btn active" data-speed="5500">简单</button>

            <button class="main-btn" onclick="startGame()">开始游戏</button>
            <button class="main-btn" style="background:none; color:white; font-size:16px;" onclick="backToMenu()">返回主菜单</button>

        <!-- 结束界面 -->

            <div id="wrongWordsArea"></div>
            <button class="main-btn" onclick="restartGame()">再来一局</button>
            <button class="main-btn" style="background:none; color:white; font-size:16px;" onclick="backToMenu()">返回主菜单</button>

        <!-- 游戏头 -->

        <div class="lives-container" id="livesContainer"></div>
        <div class="sound-toggle" id="soundToggle">🔊</div>
        <div class="question-area"><span id="englishQuestionWord">—</span></div>
        <div id="result-message"></div>

            <div class="runner" id="runner">

                <div class="runner-legs"><div class="leg"></div><div class="leg"></div></div>
            </div>
        </div>
        <div class="timeline" id="timeline"></div>

sh: "description", chinese: "描述" }
            ]
        };

        const distractorPool = ["学校", "高兴", "伤心", "勇敢", "苹果", "老师", "医生", "足球", "游泳", "跳舞", "红色", "蓝色", "作业", "天气", "时间", "努力", "桌子", "电脑", "手机", "画画", "跳远",
            "工厂", "兴奋的", "美妙的", "贫穷的", "极冷的", "原因", "所有事物", "有钱的", "国际象棋", "例子", "认为", "调查", "指示", "空的", "发生", "报告", "帽子", "理发师",
            "肩膀", "顾客", "吃惊的", "剪刀", "办公室", "邮政局", "机灵的", "癌症", "选择", "梦想", "记录", "完成", "袭击", "奖牌", "胜利", "勇气", "精神", "美味", "牛肉", "胡萝卜", "羊肉"
        ];

        const encouragements = ["错误是进步的阶梯！💪", "记住这些错词，你就变强了！📚", "别气馁，再来一次一定会更棒！🌟", "学习就是不断纠错的过程，加油！✨"];

        // ==================== 音效系统 ====================
        let audioCtx = null;
        let isMuted = false;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') {
                    const resume = () => { audioCtx.resume().then(() => { document.body.removeEventListener('touchstart', resume); document.body.removeEventListener('mousedown', resume); }); };
                    document.body.addEventListener('touchstart', resume, {once: true});
                    document.body.addEventListener('mousedown', resume, {once: true});
                }
            }
        }
        function playSnd(freqs, d=0.3) {
            if(isMuted || !audioCtx) return;
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = freqs[0] > 400 ? 'sine' : 'sawtooth'; osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(freqs[0], audioCtx.currentTime);
            if(freqs[1]) osc.frequency.exponentialRampToValueAtTime(freqs[1], audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            osc.start(); osc.stop(audioCtx.currentTime + d);
        }

        // ==================== 核心逻辑 ====================
        let activeUnit = 1; // 当前选择的单元
        let vocabularyData = allUnitsData[activeUnit]; // 存储当前单元的单词数据
        let currentQ = 0, score = 0, lives = 3, gameActive = false, currentLane = 1, GAME_SPEED = 5500;
        let animFrame = null, animStart = null, wrongWords = [], correctIdx = 0;

        const runner = document.getElementById('runner');
        const gameAreaEl = document.getElementById('gameArea');
        const boxes = [document.getElementById('box0'), document.getElementById('box1'), document.getElementById('box2')];
        const opts = [document.getElementById('option0'), document.getElementById('option1'), document.getElementById('option2')];
        const timelineEl = document.getElementById('timeline');
        const questionWord = document.getElementById('englishQuestionWord');
        const resultMsg = document.getElementById('result-message');
        const unitSelectionScreen = document.getElementById('unitSelectionScreen');
        const difficultyScreen = document.getElementById('difficultyScreen');
        const gameOverEl = document.getElementById('gameOver');
        const livesEl = document.getElementById('livesContainer');
        const wrongWordsArea = document.getElementById('wrongWordsArea');
        const gameHeaderTitle = document.getElementById('gameHeaderTitle');

        function hasConflict(dist, correct) {
            const parts = correct.split(/[，；、（）()]/g).map(s => s.trim()).filter(s => s.length > 0);
            const d = dist.trim();
            if (d === correct.trim()) return true;
            for (const p of parts) {
                if (d === p || p === d) return true;
                if (p.length >= 2 && (d.includes(p) || p.includes(d))) return true;
            }
            return false;
        }

        // --- 单元选择逻辑 ---
        function selectUnit(num) {
            activeUnit = num;
            vocabularyData = allUnitsData[num];
            unitSelectionScreen.classList.add('hidden');
            difficultyScreen.classList.remove('hidden');
            document.getElementById('selectedUnitTitle').textContent = "Unit " + num; // 修正为 Unit
            gameHeaderTitle.textContent = "Unit " + num + " 跑酷"; // 修正为 Unit
            document.getElementById('total').textContent = vocabularyData.length; // 更新总单词数
        }

        function backToMenu() {
            stopAnimation(); // 停止游戏动画
            gameActive = false; // 确保游戏非活跃
            unitSelectionScreen.classList.remove('hidden');
            difficultyScreen.classList.add('hidden');
            gameOverEl.classList.add('hidden');
            document.getElementById('score').textContent = '0'; // 分数归零
        }

        function startGame() {
            initAudio();
            difficultyScreen.classList.add('hidden');
            currentQ = 0; score = 0; lives = 3; wrongWords = [];
            updateHearts(); moveRunner();
            initTimeline();
            loadQuestion();
        }

        function loadQuestion() {
            if (currentQ >= vocabularyData.length) return endGame(true);
            stopAnimation();
            const q = vocabularyData[currentQ];
            const safePool = distractorPool.filter(d => !hasConflict(d, q.chinese));
            const shuffledPool = [...safePool].sort(() => Math.random() - 0.5);
            const options = [q.chinese, shuffledPool[0], shuffledPool[1]].sort(() => Math.random() - 0.5);
            correctIdx = options.indexOf(q.chinese);
            questionWord.textContent = q.english;
            opts.forEach((el, i) => el.textContent = options[i]);
            updateTimeline();
            setTimeout(() => { gameActive = true; startAnimation(); }, 400);
        }

        function checkAnswer() {
            gameActive = false; stopAnimation();
            const q = vocabularyData[currentQ];
            if (currentLane === correctIdx) {
                score++; playSnd([523, 784]); showMsg('✓ Correct!', 'correct');
                setTimeout(() => { currentQ++; loadQuestion(); }, 800);
            } else {
                lives--; playSnd([330, 196]); showMsg('✗ Wrong!', 'wrong');
                wrongWords.push(q); updateHearts();
                if (lives <= 0) setTimeout(() => endGame(false), 1000);
                else setTimeout(() => { currentQ++; loadQuestion(); }, 1000);
            }
            document.getElementById('score').textContent = score;
        }

        function startAnimation() {
            animStart = performance.now();
            function step(ts) {
                const progress = Math.min((ts - animStart) / GAME_SPEED, 1);
                boxes.forEach(b => b.style.top = (-200 + (window.innerHeight + 250) * progress) + 'px');
                if (progress < 1) animFrame = requestAnimationFrame(step); else checkAnswer();
            }
            animFrame = requestAnimationFrame(step);
        }

        function stopAnimation() { if(animFrame) cancelAnimationFrame(animFrame); boxes.forEach(b => b.style.top = '-200px'); }
        
        function selectLane(i) { if(gameActive) { currentLane = i; moveRunner(); } }
        function moveRunner() { const w = gameAreaEl.offsetWidth / 3; runner.style.left = (currentLane * w + w/2 - 25) + 'px'; }
        
        function updateHearts() {
            const c = document.getElementById('livesContainer'); c.innerHTML = '';
            for(let i=0; i<3; i++) c.innerHTML += `<span class="heart ${i >= lives ? 'lost' : ''}">❤️</span>`;
        }
        function updateScore() { document.getElementById('score').textContent = score; document.getElementById('total').textContent = vocabularyData.length; }
        
        function initTimeline() {
            timelineEl.innerHTML = '';
            vocabularyData.forEach((item, i) => {
                timelineEl.innerHTML += `<div class="timeline-item" id="t-${i}"><div class="year">${item.english}</div></div>`;
            });
        }
        function updateTimeline() {
            document.querySelectorAll('.timeline-item').forEach((el, i) => {
                el.classList.remove('active', 'completed');
                if (i < currentQ) el.classList.add('completed');
                else if (i === currentQ) el.classList.add('active');
            });
            const activeItem = document.getElementById('t-' + currentQ);
            if(activeItem) timelineEl.scrollTo({ top: activeItem.offsetTop - 20, behavior: 'smooth' });
        }

        function showMsg(txt, cls) {
            const el = document.getElementById('result-message');
            el.textContent = txt; el.className = 'show ' + cls;
            setTimeout(() => el.className = '', 700);
        }

        function endGame(win) {
            gameActive = false; stopAnimation();
            document.getElementById('gameOverTitle').textContent = win ? "🎉 闯关成功！" : "😭 继续努力！";
            document.getElementById('finalScore').textContent = score + " / " + vocabularyData.length;
            const area = document.getElementById('wrongWordsArea');
            if (wrongWords.length > 0) {
                let html = '<div class="wrong-words-section"><h3>📖 错题本复习:</h3><div class="wrong-words-list">';
                wrongWords.forEach(w => html += `<div class="wrong-word-card"><div class="eng">${w.english}</div><div class="chn">${w.chinese}</div></div>`);
                area.innerHTML = html + '</div><p class="encourage-text">记得复习这些单词哦！💪</p></div>';
            } else { area.innerHTML = '<p class="encourage-text" style="color:#2ecc71">太棒了！零错误通关！🏆</p>'; }
            document.getElementById('gameOver').classList.remove('hidden');
        }

        function restartGame() {
            document.getElementById('gameOver').classList.add('hidden');
            startGame();
        }

        // --- 事件绑定 ---
        document.getElementById('lane0').onclick = () => selectLane(0);
        document.getElementById('lane1').onclick = () => selectLane(1);
        document.getElementById('lane2').onclick = () => selectLane(2);
        document.addEventListener('keydown', e => {
            if(e.key === 'ArrowLeft') selectLane(Math.max(0, currentLane-1));
            if(e.key === 'ArrowRight') selectLane(Math.min(2, currentLane+1));
        });
        document.getElementById('soundToggle').onclick = function() {
            initAudio(); isMuted = !isMuted; this.textContent = isMuted ? '🔇' : '🔊'; this.classList.toggle('muted', isMuted);
        };
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.onclick = function() {
                document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active'); GAME_SPEED = parseInt(this.dataset.speed);
            };
        });

        // 默认初始化
        document.addEventListener('DOMContentLoaded', () => {
            const defaultSpeedBtn = document.querySelector('.difficulty-btn.active');
            if (defaultSpeedBtn) GAME_SPEED = parseInt(defaultSpeedBtn.dataset.speed);
            // 确保初始显示单元选择界面
            unitSelectionScreen.classList.remove('hidden');
            difficultyScreen.classList.add('hidden');
            gameOverEl.classList.add('hidden');
        });
    </script>
